plugins {
    id("com.android.application")
    id("org.jetbrains.kotlin.android")
}

android {
    namespace 'com.example.mynative.cemaks'
    compileSdk 36
    ndkVersion '29.0.14206865'

    defaultConfig {
        applicationId 'com.example.mynative.cemaks'
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName '1.0'
        
        ndk {
            abiFilters 'arm64-v8a'
        }
    }

    buildFeatures {
        viewBinding true
    }

    externalNativeBuild {
        cmake {
            path 'src/main/cpp/CMakeLists.txt'
            version '3.25.1'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
